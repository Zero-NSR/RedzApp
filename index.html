<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redz Certificate Manager</title>
    <style>
        :root { --redz: #ff3b30; --bg: #000; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 25px; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 100%; box-sizing: border-box; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        .btn { background: var(--redz); color: white; padding: 16px; border-radius: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .status { font-size: 0.8rem; color: #888; margin-top: 10px; }
        .info-box { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-top: 15px; display: none; text-align: right; font-size: 13px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: var(--redz);">تعديل ورفع الشهادة</h2>
        <p class="status">ارفع ملف .mobileprovision لتجهيز الإعدادات</p>

        <input type="file" id="certInput" accept=".mobileprovision" onchange="analyzeCert()">
        
        <input type="text" id="certName" placeholder="اسم الشهادة (مثلاً: Forevermark)">
        <input type="text" id="bundleId" placeholder="المعرف (Bundle ID)">
        <input type="text" id="teamName" placeholder="اسم الفريق (Team Name)">

        <button class="btn" onclick="buildAndInstall()">تحويل وتثبيت كشهادة إعدادات</button>
        
        <div id="infoBox" class="info-box">
            <p>✅ تم تحليل بيانات الشهادة بنجاح.</p>
            <p id="expiryDate" style="color: #00ff00;"></p>
        </div>
    </div>

    <script>
        function analyzeCert() {
            const file = document.getElementById('certInput').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = new TextDecoder().decode(e.target.result);
                
                // استخراج الـ Bundle ID
                const bidMatch = content.match(/<key>application-identifier<\/key>\s*<string>(.*?)<\/string>/);
                // استخراج اسم الشهادة
                const nameMatch = content.match(/<key>Name<\/key>\s*<string>(.*?)<\/string>/);
                // استخراج اسم الفريق
                const teamMatch = content.match(/<key>TeamName<\/key>\s*<string>(.*?)<\/string>/);

                if (bidMatch) {
                    let fullId = bidMatch[1];
                    document.getElementById('bundleId').value = fullId.includes('.') ? fullId.split('.').slice(1).join('.') : fullId;
                }
                if (nameMatch) document.getElementById('certName').value = nameMatch[1];
                if (teamMatch) document.getElementById('teamName').value = teamMatch[1];

                document.getElementById('infoBox').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        }

        function buildAndInstall() {
            const name = document.getElementById('certName').value || "Redz Cert";
            const bid = document.getElementById('bundleId').value || "com.redz.config";
            const team = document.getElementById('teamName').value || "Redz Team";
            const uuid = "REDZ-" + Math.random().toString(36).substring(7).toUpperCase();

            // إنشاء ملف التعريف (MobileConfig) بدقة عالية
            const config = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadDescription</key><string>تجهيز شهادة التوقيع لمتجر Redz</string>
            <key>PayloadDisplayName</key><string>${name}</string>
            <key>PayloadIdentifier</key><string>com.apple.mgmt.${uuid}</string>
            <key>PayloadOrganization</key><string>${team}</string>
            <key>PayloadType</key><string>Configuration</string>
            <key>PayloadUUID</key><string>${uuid}</string>
            <key>PayloadVersion</key><integer>1</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key><string>شهادة Redz: ${name}</string>
    <key>PayloadIdentifier</key><string>${bid}</string>
    <key>PayloadOrganization</key><string>${team}</string>
    <key>PayloadRemovalDisallowed</key><false/>
    <key>PayloadType</key><string>Configuration</string>
    <key>PayloadUUID</key><string>${uuid}</string>
    <key>PayloadVersion</key><integer>1</integer>
</dict>
</plist>`;

            const base64 = btoa(unescape(encodeURIComponent(config)));
            window.location.href = 'data:application/x-apple-aspen-config;base64,' + base64;
        }
    </script>
</body>
</html>
