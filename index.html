<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tong Tong Python IDE</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; flex-direction: column; }
        #editor { height: 300px; border-radius: 12px; font-size: 16px; margin: 10px; }
        #output { background: #000; color: #10b981; padding: 15px; margin: 10px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; flex-grow: 1; overflow-y: auto; border: 1px solid #1e293b; }
        .loading { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold text-purple-500">TONG TONG <span class="text-white">PYTHON</span></h1>
        <button onclick="runPython()" id="run-btn" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-xl font-bold transition flex items-center shadow-lg shadow-green-900/20">
            تشغيل الكود 🚀
        </button>
    </div>

    <div id="editor"># اكتب كود بايثون هنا
print("أهلاً بك في محرر Tong Tong!")
name = "الوحش"
print(f"بالتوفيق يا {name}")

for i in range(3):
    print(f"الرقم: {i}")
    </div>

    <div class="mt-4 px-2 font-bold text-sm text-gray-400">المخرجات (Output):</div>
    <div id="output" class="text-sm">جاري تحميل محرك بايثون... انتظر قليلاً ⏳</div>

    <script>
        // إعداد المحرر (Ace Editor)
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/one_dark");
        editor.session.setMode("ace/mode/python");

        let pyodide;
        // تحميل محرك بايثون (Pyodide)
        async function setup() {
            pyodide = await loadPyodide();
            document.getElementById("output").innerText = "المحرك جاهز! اكتب كودك واضغط تشغيل.";
        }
        setup();

        // دالة التشغيل
        async function runPython() {
            const outputDiv = document.getElementById("output");
            const btn = document.getElementById("run-btn");
            
            outputDiv.innerText = "جاري التنفيذ... ⚙️";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const code = editor.getValue();
                // إعادة توجيه الـ print لـ outputDiv
                pyodide.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                `);
                
                await pyodide.runPythonAsync(code);
                
                const stdout = pyodide.runPython("sys.stdout.getvalue()");
                outputDiv.innerText = stdout || "تم التنفيذ بنجاح (لا توجد مخرجات).";
            } catch (err) {
                outputDiv.innerText = "خطأ في الكود: \n" + err;
                outputDiv.style.color = "#ef4444";
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                outputDiv.style.color = "#10b981";
            }
        }
    </script>
</body>
</html>
