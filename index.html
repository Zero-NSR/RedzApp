<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tong Tong Code Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; flex-direction: column; }
        #editor { flex-grow: 1; font-size: 16px; border-radius: 12px; margin: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .neon-border { border: 1px solid #8b5cf6; box-shadow: 0 0 10px #8b5cf6; }
    </style>
</head>
<body class="p-2 sm:p-5">

    <div class="flex justify-between items-center mb-4 px-4">
        <h1 class="text-2xl font-black italic text-purple-500">TONG TONG <span class="text-white not-italic">IDE</span></h1>
        <div class="space-x-2 flex rtl:space-x-reverse">
            <button onclick="copyCode()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-xs font-bold transition">نسخ الكود 📋</button>
            <button onclick="downloadCode()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-xl text-xs font-bold transition">تحميل الملف 💾</button>
        </div>
    </div>

    <div class="px-4 mb-2">
        <select id="language" onchange="changeLanguage()" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-1 text-xs outline-none">
            <option value="ace/mode/lua">Lua (Roblox)</option>
            <option value="ace/mode/python">Python</option>
            <option value="ace/mode/javascript">JavaScript</option>
        </select>
    </div>

    <div id="editor">-- اكتب كودك هنا...
print("Hello from Tong Tong IDE")</div>

    <script>
        // إعداد المحرر
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/one_dark"); // شكل احترافي داكن
        editor.session.setMode("ace/mode/lua");
        editor.setShowPrintMargin(false);

        // تغيير اللغة
        function changeLanguage() {
            var lang = document.getElementById("language").value;
            editor.session.setMode(lang);
        }

        // دالة النسخ
        function copyCode() {
            const code = editor.getValue();
            navigator.clipboard.writeText(code);
            alert("تم نسخ الكود بنجاح!");
        }

        // دالة التحميل
        function downloadCode() {
            const code = editor.getValue();
            const blob = new Blob([code], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "script.lua";
            a.click();
        }
    </script>
</body>
</html>
