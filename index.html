<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redz Signer & Profile</title>
    <style>
        :root { --redz: #ff3b30; --bg: #000; --card: #111; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 20px; text-align: center; line-height: 1.6; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,59,48,0.1); }
        h2 { color: var(--redz); margin-bottom: 20px; font-size: 1.5rem; }
        input { width: 90%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #050505; color: #fff; text-align: center; font-size: 14px; }
        input:focus { border-color: var(--redz); outline: none; }
        .btn { background: var(--redz); color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .status { font-size: 0.85rem; color: #888; margin-top: 10px; }
        .file-box { border: 2px dashed #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; position: relative; }
    </style>
</head>
<body>

    <div class="container">
        <h2>لوحة تحكم Redz</h2>

        <div class="card">
            <h3 style="margin-top:0;">📂 تحويل الشهادة للإعدادات</h3>
            <div class="file-box">
                <p class="status">اختر ملف .mobileprovision</p>
                <input type="file" id="certFile" accept=".mobileprovision" onchange="handleFile()">
            </div>
            <input type="text" id="bundleId" placeholder="الـ Bundle ID المستخرج">
            <button class="btn" style="background: #007aff;" onclick="generateProfile()">تحويل وتثبيت كملف تعريف</button>
            <p id="msg" class="status"></p>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">🚀 توقيع وتثبيت التطبيقات</h3>
            <input type="text" id="ipaUrl" placeholder="رابط الـ IPA المباشر">
            <input type="text" id="appName" placeholder="اسم التطبيق">
            <button class="btn" onclick="installApp()">تثبيت فوري بالـ ID المكتوب</button>
        </div>
    </div>

    <script>
        // دالة استخراج البيانات عند اختيار ملف
        function handleFile() {
            const file = document.getElementById('certFile').files[0];
            const msg = document.getElementById('msg');
            const bundleInput = document.getElementById('bundleId');
            
            if (!file) return;

            const reader = new FileReader();
            msg.innerText = "جاري قراءة الملف...";
            
            reader.onload = function(e) {
                const content = new TextDecoder().decode(e.target.result);
                
                // البحث عن الـ Bundle Identifier في ملف الشهادة
                const match = content.match(/<key>application-identifier<\/key>\s*<string>(.*?)<\/string>/);
                if (match && match[1]) {
                    // تنظيف المعرف من كود الفريق (Team ID)
                    let fullId = match[1];
                    let cleanId = fullId.includes('.') ? fullId.split('.').slice(1).join('.') : fullId;
                    bundleInput.value = cleanId;
                    msg.innerText = "تم استخراج المعرف بنجاح ✅";
                    msg.style.color = "#00ff00";
                } else {
                    msg.innerText = "تعذر الاستخراج تلقائياً، اكتبه يدوياً";
                    msg.style.color = "#ffcc00";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // تحويل لملف تعريف (Mobileconfig)
        function generateProfile() {
            const bid = document.getElementById('bundleId').value || "com.redz.cert";
            const uuid = "REDZ-" + Math.random().toString(36).substring(7).toUpperCase();
            
            const config = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key><array/>
    <key>PayloadDisplayName</key><string>Redz Store Cert (${bid})</string>
    <key>PayloadIdentifier</key><string>com.redz.profile.${uuid}</string>
    <key>PayloadType</key><string>Configuration</string>
    <key>PayloadUUID</key><string>${uuid}</string>
    <key>PayloadVersion</key><integer>1</integer>
</dict>
</plist>`;

            const blob = new Blob([config], { type: 'application/x-apple-aspen-config' });
            window.location.href = window.URL.createObjectURL(blob);
        }

        // التثبيت باستخدام Plist فوري
        function installApp() {
            const ipa = document.getElementById('ipaUrl').value;
            const name = document.getElementById('appName').value;
            const bid = document.getElementById('bundleId').value;

            if(!ipa || !name || !bid) return alert("امسك! كمل البيانات (IPA + اسم + ID)");

            const plist = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${ipa}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${bid}</string><key>bundle-version</key><string>1.0</string><key>kind</key><string>software</string><key>title</key><string>${name}</string></dict></dict></array></dict></plist>`;
            
            const base64 = btoa(unescape(encodeURIComponent(plist)));
            window.location.href = `itms-services://?action=download-manifest&url=data:text/xml;base64,${base64}`;
        }
    </script>
</body>
</html>
